<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>李林美视觉作品集</title>
    <script>
      ;(function (location) {
        if (location.search[1] === '/') {
          var decodedPath = location.search
            .slice(1)
            .split('&')
            .map(function (part) {
              return part.replace(/~and~/g, '&')
            })
            .join('?')

          window.history.replaceState(
            null,
            null,
            location.pathname.slice(0, -1) + decodedPath + location.hash,
          )
        }
      })(window.location)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
